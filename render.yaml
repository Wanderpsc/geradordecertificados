services:
  - type: web
    name: gerador-certificados
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LICENSE_ENCRYPTION_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://gerador-certificados.onrender.com,https://gerador-certificados.surge.sh
